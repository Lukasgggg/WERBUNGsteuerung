<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Anzeige Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --card-bg: rgba(30, 30, 30, 0.9);
            --accent-a: #008CBA;
            --accent-b: #f44336;
        }

        body.theme-light {
            --bg-color: #f4f4f9;
            --text-color: #333333;
            --card-bg: rgba(255, 255, 255, 0.9);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background 0.5s, color 0.5s;
        }

        /* Google Slides Präsentations-Container */
        #container {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
        }
        #screen {
            width: 100%; height: 100%;
            border: none;
        }

        /* ⏱️ Kleine Uhr oben links */
        #small-clock {
            display: none;
            position: absolute;
            top: 15px; left: 15px;
            font-size: 28px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 5px 15px;
            border-radius: 8px;
            z-index: 10;
        }

        /* 🕒 Großes Uhr-Widget / Pausentimer */
        #widget-clock-container {
            display: none; /* Wird über den Modus gesteuert */
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            z-index: 5;
            min-width: 300px;
        }
        #widget-time {
            font-size: 80px;
            font-weight: bold;
            margin: 0;
        }
        #widget-label {
            font-size: 24px;
            margin-top: 10px;
            color: #888;
        }

        /* 📊 Fortschrittsbalken für den Pausentimer */
        .progress-bar-container {
            display: none;
            width: 100%;
            background: #444;
            height: 15px;
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: #2196F3;
            transition: width 1s linear;
        }

        /* 📢 Eigene Nachricht (Blackout / Alert) */
        #alert-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: black;
            z-index: 6;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
            box-sizing: border-box;
        }
        #alert-msg {
            font-size: 50px;
            font-weight: bold;
            color: white;
        }

        /* 📊 LIVE-UMFRAGE OVERLAY SYSTEM */
        #poll-overlay {
            display: none;
            position: absolute;
            box-sizing: border-box;
            transition: all 0.5s ease-in-out;
            z-index: 8;
        }

        /* Umfrage-Modus: VOLLscreen */
        #poll-overlay.mode-full {
            display: flex;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-color);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }
        .mode-full .poll-header { font-size: 45px; margin-bottom: 10px; font-weight: bold; }
        .mode-full .poll-desc { font-size: 24px; margin-bottom: 30px; color: #aaa; }
        .mode-full .qr-zone { display: block; margin-bottom: 20px; }
        .mode-full .qr-zone img { width: 250px; height: 250px; border: 10px solid white; border-radius: 10px; }
        .mode-full .results-zone { display: none; width: 100%; max-width: 600px; }

        /* Umfrage-Modus: MINIMIERT (Banner unten) */
        #poll-overlay.mode-minimized {
            display: flex;
            top: auto; bottom: 0; left: 0; width: 100vw; height: 130px;
            background: var(--card-bg);
            border-top: 3px solid #555;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            padding: 10px 30px;
        }
        .mode-minimized .poll-header { font-size: 24px; margin: 0; font-weight: bold; text-align: left; }
        .mode-minimized .poll-desc { font-size: 16px; margin: 5px 0 0 0; color: #888; text-align: left; }
        .mode-minimized .qr-zone { display: block; }
        .mode-minimized .qr-zone img { width: 95px; height: 95px; border: 4px solid white; border-radius: 5px; }
        .mode-minimized .results-zone { display: none; }

        /* Umfrage-Modus: AUFLÖSUNG (Ergebnisse) */
        #poll-overlay.mode-results {
            display: flex;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-color);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        .mode-results .poll-header { font-size: 50px; margin-bottom: 30px; font-weight: bold; }
        .mode-results .poll-desc { display: none; }
        .mode-results .qr-zone { display: none; }
        .mode-results .results-zone { display: flex; flex-direction: column; gap: 30px; width: 100%; max-width: 800px; }

        /* Ergebnisleisten Styling */
        .bar-wrapper { width: 100%; text-align: left; }
        .bar-label { font-size: 24px; font-weight: bold; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .bar-outer { width: 100%; background: #333; height: 40px; border-radius: 20px; overflow: hidden; }
        .bar-inner { width: 0%; height: 100%; transition: width 1s ease-out; }
        .bar-inner.a { background: var(--accent-a); }
        .bar-inner.b { background: var(--accent-b); }
    </style>
</head>
<body class="theme-dark">

    <div id="small-clock">00:00:00</div>

    <div id="widget-clock-container">
        <p id="widget-time">00:00</p>
        <p id="widget-label">Uhrzeit</p>
        <div class="progress-bar-container" id="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <div id="alert-overlay">
        <div id="alert-msg">Bildschirm ausgeschaltet</div>
    </div>

    <div id="poll-overlay" class="mode-full">
        <div>
            <div class="poll-header" id="tv-poll-title">Live-Umfrage</div>
            <div class="poll-desc" id="tv-poll-desc">Scannen zum Abstimmen!</div>
        </div>
        
        <div class="qr-zone">
            <img id="tv-qr-code" src="" alt="QR Code">
        </div>

        <div class="results-zone">
            <div class="bar-wrapper">
                <div class="bar-label"><span id="lbl-optA">Option A</span><span id="pct-optA">0%</span></div>
                <div class="bar-outer"><div class="bar-inner a" id="bar-optA"></div></div>
            </div>
            <div class="bar-wrapper">
                <div class="bar-label"><span id="lbl-optB">Option B</span><span id="pct-optB">0%</span></div>
                <div class="bar-outer"><div class="bar-inner b" id="bar-optB"></div></div>
            </div>
        </div>
    </div>

    <div id="container">
        <iframe id="screen" src="https://docs.google.com/presentation/d/e/2PACX-1vQYSDiNWgoUySOYEu1qDTetowoaZc7hbNeWHeG8gMveqpJRoWj_qr9QNpmiwHGo1AR9n80qi9nXCbm8/pubembed?start=true&loop=true&delayms=10000" frameborder="0" allowfullscreen></iframe>
    </div>

    <script>
        // Firebase Konfiguration (Exakt dieselbe wie in deiner Steuerung!)
        const firebaseConfig = {
            apiKey: "AIzaSyDLvfW6NyXcxAPYakErDOMNiIj9Iii6PO8",
            authDomain: "werbungfersteuern.firebaseapp.com",
            databaseURL: "https://werbungfersteuern-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "werbungfersteuern",
            storageBucket: "werbungfersteuern.firebasestorage.app",
            messagingSenderId: "630825517269",
            appId: "1:630825517269:web:44cf935bee6c1074c2e25c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Globale Variablen für Timer-Berechnungen
        let serverEndTime = null;
        let serverStartTime = null;
        let currentMode = "werbung";

        // 1. Uhren-Ticker (Aktualisiert jede Sekunde die normale Uhrzeit)
        setInterval(() => {
            const now = new Date();
            const timeStringStr = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const shortTimeStr = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
            
            // Kleine Uhr oben links updaten
            document.getElementById('small-clock').innerText = timeStringStr;

            // Wenn der Modus auf normale "clock" steht, zeige die aktuelle Uhrzeit im großen Widget
            if (currentMode === "clock") {
                document.getElementById('widget-time').innerText = shortTimeStr;
                document.getElementById('widget-label').innerText = "Uhrzeit";
                document.getElementById('progress-container').style.display = "none";
            } 
            // Wenn ein Pausentimer läuft, berechne stattdessen den Countdown und den Balken
            else if (currentMode === "custom_pause" && serverEndTime) {
                const diff = serverEndTime - Date.now();
                
                if (diff <= 0) {
                    document.getElementById('widget-time').innerText = "00:00";
                    document.getElementById('progress-bar').style.width = "100%";
                } else {
                    const m = Math.floor(diff / 1000 / 60).toString().padStart(2, '0');
                    const s = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
                    document.getElementById('widget-time').innerText = `${m}:${s}`;
                    document.getElementById('widget-label').innerText = "Pause endet in...";
                    
                    // Fortschrittsbalken in % berechnen
                    if (serverStartTime) {
                        const total = serverEndTime - serverStartTime;
                        const passed = Date.now() - serverStartTime;
                        const pct = Math.min(100, Math.max(0, (passed / total) * 100));
                        document.getElementById('progress-bar').style.width = pct + "%";
                        document.getElementById('progress-container').style.display = "block";
                    }
                }
            }
        }, 1000);

        // 2. Firebase Listener: Empfange Befehle der Fernbedienung
        db.ref('status').on('value', (snapshot) => {
            const status = snapshot.val();
            if (!status) return;

            currentMode = status.mode;
            serverEndTime = status.endTime;
            serverStartTime = status.startTime;

            // Alle Overlays zuerst zurücksetzen
            document.getElementById('alert-overlay').style.display = "none";
            document.getElementById('widget-clock-container').style.display = "none";
            document.getElementById('poll-overlay').className = ""; 
            document.getElementById('poll-overlay').style.display = "none";

            // Modus-Weiche auswerten
            if (currentMode === "blackout") {
                document.getElementById('alert-overlay').style.display = "flex";
                document.getElementById('alert-msg').innerText = "Bildschirm vorübergehend deaktiviert";
                document.getElementById('alert-overlay').style.background = "black";
            } 
            else if (currentMode === "pause5") {
                document.getElementById('alert-overlay').style.display = "flex";
                document.getElementById('alert-msg').innerText = "⏳ 5 Minuten Pause gleich vorbei!";
                document.getElementById('alert-overlay').style.background = "rgba(156, 39, 176, 0.95)";
            } 
            else if (currentMode === "pause3") {
                document.getElementById('alert-overlay').style.display = "flex";
                document.getElementById('alert-msg').innerText = "⏳ Schnell zurück! Noch 3 Minuten!";
                document.getElementById('alert-overlay').style.background = "rgba(233, 30, 99, 0.95)";
            } 
            else if (currentMode === "alert_text") {
                document.getElementById('alert-overlay').style.display = "flex";
                document.getElementById('alert-msg').innerText = status.msg || "Nachricht";
                document.getElementById('alert-overlay').style.background = "rgba(0,0,0,0.9)";
            } 
            else if (currentMode === "clock" || currentMode === "custom_pause") {
                // Widget einblenden
                document.getElementById('widget-clock-container').style.display = "block";
            }
            // Die 3 Abstimmmodi
            else if (currentMode === "poll") {
                const overlay = document.getElementById('poll-overlay');
                overlay.classList.add('mode-full');
                overlay.style.display = "flex";
            } 
            else if (currentMode === "poll_minimized") {
                const overlay = document.getElementById('poll-overlay');
                overlay.classList.add('mode-minimized');
                overlay.style.display = "flex";
            } 
            else if (currentMode === "poll_results") {
                const overlay = document.getElementById('poll-overlay');
                overlay.classList.add('mode-results');
                overlay.style.display = "flex";
            }
        });

        // 3. Firebase Listener: Kleine Uhr (⏱️) Status abrufen
        db.ref('settings/smallClock').on('value', (snapshot) => {
            const showSmallClock = snapshot.val() || false;
            document.getElementById('small-clock').style.display = showSmallClock ? "block" : "none";
        });

        // 4. Firebase Listener: Theme (Hell / Dunkel) synchronisieren
        db.ref('settings/theme').on('value', (snapshot) => {
            const theme = snapshot.val();
            if (theme) document.body.className = theme;
        });

        // 5. Firebase Listener: Umfragedaten & Live-Stimmen auslesen
        db.ref('poll').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // Texte setzen
            document.getElementById('tv-poll-title').innerText = data.title;
            document.getElementById('tv-poll-desc').innerText = data.description;
            document.getElementById('lbl-optA').innerText = data.optionA;
            document.getElementById('lbl-optB').innerText = data.optionB;

            // QR-Code Live-Generierung über freie API
            if (data.qrUrl) {
                document.getElementById('tv-qr-code').src = "https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=" + encodeURIComponent(data.qrUrl);
            }

            // Prozentberechnung für die dicken Balken bei der Auflösung
            const vA = data.votesA || 0;
            const vB = data.votesB || 0;
            const total = vA + vB;

            let pctA = 0;
            let pctB = 0;

            if (total > 0) {
                pctA = Math.round((vA / total) * 100);
                pctB = Math.round((vB / total) * 100);
            } else {
                pctA = 50; // Standardwert wenn noch niemand abgestimmt hat
                pctB = 50;
            }

            // Balken-Breite und Prozent-Texte animieren
            document.getElementById('bar-optA').style.width = pctA + "%";
            document.getElementById('pct-optA').innerText = `${pctA}% (${vA} Stimmen)`;

            document.getElementById('bar-optB').style.width = pctB + "%";
            document.getElementById('pct-optB').innerText = `${pctB}% (${vB} Stimmen)`;
        });
    </script>
</body>
</html>
